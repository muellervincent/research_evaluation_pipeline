[standard]
ingestion_mode = "extraction"

[standard.preprocess.refinement]
model = "gemini-3.1-pro-preview"
temperature = 0.3
cache_policy = "use-cache"
strategy = "semantic"

[standard.preprocess.extraction]
model = "gemini-3.1-pro-preview"
temperature = 0.0
cache_policy = "use-cache"

[standard.assessment]
fragmentation = "plan"

[standard.assessment.decomposition]
model = "gemini-3.1-pro-preview"
temperature = 0.3
cache_policy = "use-cache"
strategy = "structural"

[standard.assessment.extraction]
model = "gemini-3-flash-preview"
temperature = 0.3
cache_policy = "use-cache"
strategy = "standard"
processing_mode = "concurrent"

[standard.assessment.synthesis]
model = "gemini-3-flash-preview"
temperature = 0.3
cache_policy = "use-cache"
strategy = "analytical"

[standard.diagnostic]
fragmentation = "plan"
prompt_source = "refined"

[standard.diagnostic.decomposition]
model = "gemini-3-flash-preview"
temperature = 0.3
cache_policy = "use-cache"
strategy = "thematic"

[standard.diagnostic.analysis]
model = "gemini-3-flash-preview"
temperature = 0.3
cache_policy = "use-cache"
strategy = "diagnose-mismatches"
processing_mode = "concurrent"

